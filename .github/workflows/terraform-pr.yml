name: "Terraform — PR Validation & Apply (Dev)"

on:
  pull_request:
    branches:
      - main
    paths:
      - "environments/**"
      - "modules/**"
      - ".github/workflows/terraform-pr.yml"

permissions:
  id-token: write       # Required for OIDC token exchange
  contents: read        # Required to checkout the repo
  pull-requests: write  # Required to post plan comment on the PR

env:
  TF_VERSION: "1.5.7"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  TF_STATE_SA: stckoassignmenttfs001
  KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
  FUNC_PKG_SA: ${{ vars.FUNC_PKG_STORAGE_ACCOUNT }}

jobs:
  validate-modules:
    name: "Validate Terraform Modules"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Validate module — infrastructure
        working-directory: modules/infrastructure
        run: |
          terraform init -backend=false
          terraform validate
          echo "✅ modules/infrastructure validated"

      - name: Validate module — vnet
        working-directory: modules/vnet
        run: |
          terraform init -backend=false
          terraform validate
          echo "✅ modules/vnet validated"

      - name: Validate module — key_vault
        working-directory: modules/key_vault
        run: |
          terraform init -backend=false
          terraform validate
          echo "✅ modules/key_vault validated"

      - name: Validate module — function_storage
        working-directory: modules/function_storage
        run: |
          terraform init -backend=false
          terraform validate
          echo "✅ modules/function_storage validated"

      - name: Validate module — function
        working-directory: modules/function
        run: |
          terraform init -backend=false
          terraform validate
          echo "✅ modules/function validated"

      - name: Validate module — app_gateway
        working-directory: modules/app_gateway
        run: |
          terraform init -backend=false
          terraform validate
          echo "✅ modules/app_gateway validated"

  plan-and-apply-dev:
    name: "Terraform Plan & Apply — Dev"
    runs-on: ubuntu-latest
    needs: validate-modules
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: .

      # ── Add runner IP to all network allowlists ─────────────────────────────
      - name: Add runner IP to network allowlists
        id: allowlist
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "runner_ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"
          echo "Adding runner IP ${RUNNER_IP} to allowlists..."
          az storage account network-rule add --account-name "$TF_STATE_SA"  --ip-address "$RUNNER_IP"
          az keyvault network-rule add        --name "$KEY_VAULT_NAME"        --ip-address "$RUNNER_IP" 2>/dev/null || true
          az storage account network-rule add --account-name "$FUNC_PKG_SA"  --ip-address "$RUNNER_IP" 2>/dev/null || true
          echo "Waiting 15s for rules to propagate..."
          sleep 15

      - name: Terraform Init — Dev
        working-directory: environments/dev
        run: terraform init

      - name: Terraform Validate — Dev
        working-directory: environments/dev
        run: terraform validate

      - name: Terraform Plan — Dev
        id: plan
        working-directory: environments/dev
        run: |
          terraform plan -no-color -out=tfplan-dev 2>&1 | tee plan-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('environments/dev/plan-output.txt', 'utf8');
            const maxLen = 60000;
            const truncated = planOutput.length > maxLen
              ? planOutput.substring(0, maxLen) + '\n\n...(truncated)'
              : planOutput;

            const body = `## 🏗️ Terraform Plan — Dev Environment

            **Triggered by:** @${{ github.actor }} on \`${{ github.head_ref }}\`

            <details>
            <summary>📋 Show Plan Output</summary>

            \`\`\`terraform
            ${truncated}
            \`\`\`
            </details>

            > Plan generated at ${{ github.sha }}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Terraform Plan — Dev Environment')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outputs.exit_code != '0'
        run: exit 1

      - name: Terraform Apply — Dev
        working-directory: environments/dev
        run: terraform apply -auto-approve tfplan-dev

      # ── Always remove runner IP ─────────────────────────────────────────────
      - name: Remove runner IP from network allowlists
        if: always()
        run: |
          RUNNER_IP="${{ steps.allowlist.outputs.runner_ip }}"
          echo "Removing runner IP ${RUNNER_IP} from allowlists..."
          az storage account network-rule remove --account-name "$TF_STATE_SA" --ip-address "$RUNNER_IP" || true
          az keyvault network-rule remove        --name "$KEY_VAULT_NAME"       --ip-address "$RUNNER_IP" || true
          az storage account network-rule remove --account-name "$FUNC_PKG_SA" --ip-address "$RUNNER_IP" || true
          echo "✅ Runner IP removed"
